<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#0d0d0d"/>
  <!-- grid -->
  <line x1="0" y1="10.6" x2="32" y2="10.6" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="21.3" x2="32" y2="21.3" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
  <line x1="10.6" y1="0" x2="10.6" y2="32" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
  <line x1="21.3" y1="0" x2="21.3" y2="32" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
  <!-- flask neck -->
  <rect x="12" y="3" width="8" height="9" rx="1" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- flask body -->
  <path d="M12 12 L5 25 Q5 30 16 30 Q27 30 27 25 L20 12 Z" fill="none" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- liquid fill -->
  <path d="M7.5 23 Q7 29 16 29 Q25 29 24.5 23 L21 17 L11 17 Z" fill="#fff" opacity="0.07"/>
  <!-- circuit nodes -->
  <circle cx="12" cy="22" r="1.8" fill="#fff"/>
  <circle cx="16" cy="19" r="1.8" fill="#fff"/>
  <circle cx="20" cy="22" r="1.8" fill="#fff"/>
  <circle cx="14" cy="26" r="1.4" fill="#fff" opacity="0.6"/>
  <circle cx="18" cy="26" r="1.4" fill="#fff" opacity="0.6"/>
  <!-- connections -->
  <line x1="12" y1="22" x2="16" y2="19" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <line x1="16" y1="19" x2="20" y2="22" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <line x1="12" y1="22" x2="14" y2="26" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <line x1="20" y1="22" x2="18" y2="26" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <!-- bubbles in neck -->
  <circle cx="15" cy="7.5" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="17" cy="5.5" r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="19" cy="8" r="0.5" fill="#fff" opacity="0.25"/>
</svg>